id = "704f7692-2228-4378-95b5-7869925eddca"
front = "What is an incomplete normed space example?"
back = '''
$C[0, 1]$ with $||x|| = integral_0^1 |x(t)| dif t$ is *not* complete.

Its completion is $L^1[0, 1]$. More generally, $L^p[a,b]$ is the completion of continuous functions under $||x||_p = (integral_a^b |x(t)|^p dif t)^(1\/p)$.'''

