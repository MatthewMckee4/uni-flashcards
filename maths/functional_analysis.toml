front = "State the totality characterisation (Theorem 3.6-2)"
back = """
(a) If $M$ is total in $X$, then $x perp M ==> x = 0$.

(b) If $X$ is *complete*, the converse also holds: if $x perp M ==> x = 0$, then $M$ is total."""

