front = "What is a sesquilinear form?"
back = """
A mapping $h: X times Y -> K$ that is *linear* in the first argument and *conjugate linear* in the second.

It is *bounded* if $|h(x, y)| <= c ||x|| ||y||$ with norm $||h|| = sup (|h(x,y)|) / (||x|| ||y||)$."""

