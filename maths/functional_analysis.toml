front = "What is the completeness proof strategy for sequence spaces?"
back = """
General pattern:

1. Construct a candidate limit $x$ (componentwise limits exist since $RR$ and $CC$ are complete)
2. Prove $x$ is in the space
3. Prove $x_n -> x$"""

