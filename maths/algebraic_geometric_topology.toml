name = "Algebraic and Geometric Topology"
description = ""
created = "2026-03-29"
preamble = ""

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000001"
front = "What is a metric space?"
back = '''
A *metric space* $(X, d)$ is a set $X$ with $d: X times X -> RR_(gt.eq 0)$ satisfying:

- $d(x, y) = 0$ iff $x = y$
- $d(x, y) = d(y, x)$ (symmetry)
- $d(x, z) lt.eq d(x, y) + d(y, z)$ (triangle inequality)'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000002"
front = "What is a topological space?"
back = '''
A *topological space* $(X, cal(T))$ is a set $X$ with a collection $cal(T)$ of *open sets* satisfying:

- $emptyset, X in cal(T)$
- Arbitrary unions of open sets are open
- Finite intersections of open sets are open'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000003"
front = "Define interior, closure, and boundary of a set $A$ in a topological space."
back = '''
- **Interior**: $A^circle.small = union{U in cal(T) | U subset A}$ — largest open set contained in $A$
- **Closure**: $overline(A) = sect{C "closed" | A subset C}$ — smallest closed set containing $A$
- **Boundary**: $partial A = overline(A) without A^circle.small$'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000004"
front = "What is a continuous map between topological spaces? What is a homeomorphism?"
back = '''
$f: X -> Y$ is *continuous* if $f^(-1)(V)$ is open in $X$ for every open $V subset Y$.

A *homeomorphism* is a bijective continuous map with continuous inverse. We write $X tilde.equiv Y$. A homeomorphism from a compact space to a Hausdorff space is automatically a homeomorphism if it is a continuous bijection.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000005"
front = "What is a basis for a topology?"
back = '''
A *basis* $cal(B)$ for a topology on $X$ is a collection of open sets such that every open set is a union of elements of $cal(B)$.

The topology *generated* by $cal(B)$ is the collection of all unions of elements of $cal(B)$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000006"
front = "What is a Hausdorff ($T_2$) space?"
back = '''
$X$ is *Hausdorff* if for any $x != y$ in $X$, there exist disjoint open sets $U, V$ with $x in U$ and $y in V$.

Every metric space is Hausdorff. The cofinite topology on an infinite set is *not* Hausdorff.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000007"
front = "What is a compact space?"
back = '''
$X$ is *compact* if every open cover has a finite subcover:

if $X = union_(i in I) U_i$ with each $U_i$ open, then $X = U_(i_1) union dots.c union U_(i_n)$ for some finite subcollection.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000008"
front = "State the Heine-Borel theorem."
back = '''
A subset of $RR^n$ is compact if and only if it is *closed and bounded*.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000009"
front = "What are the key properties of compact spaces?"
back = '''
- Continuous images of compact spaces are compact
- Compact subsets of Hausdorff spaces are closed
- A continuous bijection from a compact space to a Hausdorff space is a homeomorphism
- The product of two compact spaces is compact (Tychonoff's theorem)'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000010"
front = "What is the difference between connectedness and path connectedness?"
back = '''
$X$ is *connected* if it cannot be written as a disjoint union of two nonempty open sets.

$X$ is *path connected* if any two points are joined by a continuous path $gamma: [0,1] -> X$.

Path connectedness implies connectedness, but the converse is false.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000011"
front = "What is the product topology on $X times Y$?"
back = '''
The topology generated by sets $U times V$ where $U$ is open in $X$ and $V$ is open in $Y$.

These *basic open sets* form a basis; arbitrary opens are unions of such products.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000012"
front = "What are the $n$-ball, $n$-sphere, torus, and real projective space as topological spaces?"
back = '''
- $B^n = {x in RR^n | ||x|| lt.eq 1}$ with $partial B^n = S^(n-1)$
- $S^n = {x in RR^(n+1) | ||x|| = 1}$ ($S^0 = {plus.minus 1}$, $S^1$ = circle, $S^2$ = 2-sphere)
- $T^2 = S^1 times S^1$ (torus)
- $RR P^n = S^n \/ (x tilde -x)$ (real projective space — antipodal identification)'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000013"
front = "What is the quotient topology?"
back = '''
Given an equivalence relation $tilde$ on $X$, the *quotient space* $X \/ tilde$ has the *quotient topology*:

$U subset X\/tilde$ is open iff $q^(-1)(U)$ is open in $X$, where $q: X -> X\/tilde$, $q(x) = [x]$.

The quotient map $q$ is always continuous and surjective.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000014"
front = "When is a map out of a quotient space well-defined and continuous?"
back = '''
$f: X\/tilde -> Y$ is *well-defined* iff $x tilde x' implies f([x]) = f([x'])$.

It is *continuous* iff $f compose q: X -> Y$ is continuous.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000015"
front = "What is the wedge sum $X vee Y$?"
back = '''
The *wedge sum* of pointed spaces $(X, x_0)$ and $(Y, y_0)$ is:
$ X vee Y = (X union.sq Y) \/ (x_0 tilde y_0) $
i.e., $X$ and $Y$ joined at a single identified basepoint.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000016"
front = "What are the standard quotient space examples for classical surfaces?"
back = '''
- $[0,1] \/ (0 tilde 1) tilde.equiv S^1$
- $S^n \/ (x tilde -x) tilde.equiv RR P^n$
- Torus $T^2$: square with $(0,t) tilde (1,t)$ and $(s,0) tilde (s,1)$
- Klein bottle $K$: square with $(0,t) tilde (1,t)$ and $(s,0) tilde (1-s, 1)$
- Möbius band: $[0,1]^2$ with $(0,t) tilde (1, 1-t)$'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000017"
front = "What is a surface (2-manifold)?"
back = '''
A *surface* is a compact, connected, Hausdorff, second-countable space where every point has a neighbourhood homeomorphic to $RR^2$ (interior point) or to the half-plane ${(x,y) | y gt.eq 0}$ (boundary point).

The *boundary* $partial X$ is the set of points with only half-plane neighbourhoods.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000018"
front = 'What is the connected sum $X \# Y$?'
back = '''
Formed by removing an open disk from each of $X$ and $Y$, then gluing the resulting boundary circles together.

Used to build all compact surfaces: $Sigma_g = T^2 \# dots.c \# T^2$ ($g$ tori) and $N_k = RR P^2 \# dots.c \# RR P^2$ ($k$ projective planes).'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000019"
front = "State the Classification Theorem for compact surfaces."
back = '''
Every compact connected surface without boundary is homeomorphic to exactly one of:

- $S^2$ (the sphere)
- $Sigma_g$ for $g gt.eq 1$ (connected sum of $g$ tori — *orientable*)
- $N_k$ for $k gt.eq 1$ (connected sum of $k$ projective planes — *non-orientable*)

These are pairwise non-homeomorphic.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000020"
front = "What is the Euler characteristic of a surface, and what are the values for $Sigma_g$ and $N_k$?"
back = '''
For a triangulated surface with $V$ vertices, $E$ edges, $F$ faces:
$ chi(X) = V - E + F $

This is a topological invariant.

$ chi(Sigma_g) = 2 - 2g, quad chi(N_k) = 2 - k $'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000021"
front = "What are the polygon word representations of the standard surfaces?"
back = '''
- $T^2$: $a b a^(-1) b^(-1)$
- $RR P^2$: $a a$
- Klein bottle $K$: $a b a^(-1) b$ (or $a a b b$)
- $Sigma_g$: $a_1 b_1 a_1^(-1) b_1^(-1) dots.c a_g b_g a_g^(-1) b_g^(-1)$
- $N_k$: $a_1 a_1 a_2 a_2 dots.c a_k a_k$'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000022"
front = "What is Dyck's theorem about connected sums of orientable and non-orientable surfaces?"
back = '''
$Sigma_g \# N_k tilde.equiv N_(2g + k)$ for any $g gt.eq 0$, $k gt.eq 1$.

In particular, $T^2 \# RR P^2 tilde.equiv RR P^2 \# RR P^2 \# RR P^2 = N_3$.

This means once you take a connected sum with even one projective plane, the result is entirely non-orientable.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000023"
front = "What is path concatenation? What is a loop?"
back = '''
For paths $gamma, delta: [0,1] -> X$ with $gamma(1) = delta(0)$:
$ (gamma * delta)(t) = cases(gamma(2t) & t in [0, 1\/2], delta(2t-1) & t in [1\/2, 1]) $

A *loop based at $x_0$* is a path with $gamma(0) = gamma(1) = x_0$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000024"
front = "What is a homotopy of paths (rel endpoints)?"
back = '''
A *homotopy* from $gamma_0$ to $gamma_1$ (both from $x_0$ to $x_1$) is a continuous map $H: [0,1] times [0,1] -> X$ with:
- $H(s, 0) = gamma_0(s)$, $H(s, 1) = gamma_1(s)$
- $H(0, t) = x_0$, $H(1, t) = x_1$ for all $t$

Written $gamma_0 tilde.eq gamma_1$; this is an equivalence relation.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000025"
front = "Define the fundamental group $pi_1(X, x_0)$."
back = '''
$pi_1(X, x_0)$ is the set of homotopy classes $[gamma]$ of loops based at $x_0$, with multiplication:
$ [gamma][delta] = [gamma * delta] $

- **Identity**: the class of the constant loop $e(t) = x_0$
- **Inverse**: $[gamma]^(-1) = [bar(gamma)]$ where $bar(gamma)(t) = gamma(1-t)$

It is a group (associativity holds up to homotopy).'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000026"
front = "Is $pi_1(X, x_0)$ independent of the basepoint?"
back = '''
Yes, if $X$ is path connected.

For any $x_0, x_1 in X$, pick a path $sigma$ from $x_0$ to $x_1$. The map $[gamma] mapsto [sigma^(-1) * gamma * sigma]$ gives an isomorphism $pi_1(X, x_0) tilde.equiv pi_1(X, x_1)$.

For path-connected spaces we write $pi_1(X)$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000027"
front = "What are the fundamental groups of basic spaces?"
back = '''
- $pi_1(RR^n) = {e}$ (contractible)
- $pi_1(S^1) tilde.equiv ZZ$
- $pi_1(S^n) = {e}$ for $n gt.eq 2$ (simply connected)
- $pi_1(T^2) tilde.equiv ZZ^2$
- $pi_1(RR P^2) tilde.equiv ZZ_2$
- $pi_1(RR^2 without {0}) tilde.equiv ZZ$'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000028"
front = "What is the winding number of a loop in $RR^2 without {0}$?"
back = '''
Write $gamma(t) = r(t) e^(i theta(t))$ with $theta$ continuous and $theta(0) = 0$. The *winding number* is:
$ n(gamma) = theta(1) \/ (2 pi) in ZZ $

It counts (signed) revolutions around the origin, is a homotopy invariant, and gives the isomorphism $pi_1(RR^2 without {0}) tilde.equiv ZZ$, hence $pi_1(S^1) tilde.equiv ZZ$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000029"
front = "What is a covering map?"
back = '''
A continuous surjection $p: tilde(X) -> X$ is a *covering map* if every $x in X$ has an open neighbourhood $U$ such that:
$ p^(-1)(U) = union.sq_alpha V_alpha $
(disjoint union of open sets), with each restriction $p|_(V_alpha): V_alpha -> U$ a homeomorphism.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000030"
front = "Give the two standard examples of covering maps."
back = '''
- $p: RR -> S^1$, $p(t) = e^(2 pi i t)$: the real line covers the circle, sheets are $[n, n+1]$.
- $p: S^n -> RR P^n$, $p(x) = [x]$ (antipodal quotient): $S^n$ is a 2-sheeted cover of $RR P^n$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000031"
front = "State the Path Lifting Theorem."
back = '''
Let $p: tilde(X) -> X$ be a covering map, $gamma: [0,1] -> X$ a path with $gamma(0) = x_0$, and $tilde(x)_0 in p^(-1)(x_0)$.

Then there exists a *unique* lift $tilde(gamma): [0,1] -> tilde(X)$ with $tilde(gamma)(0) = tilde(x)_0$ and $p compose tilde(gamma) = gamma$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000032"
front = "State the Homotopy Lifting Theorem and its key corollary."
back = '''
Let $p: tilde(X) -> X$ be a covering map, $H: [0,1] times [0,1] -> X$ a homotopy, and $tilde(gamma)_0$ a lift of $H(dot, 0)$. Then there is a unique homotopy $tilde(H)$ lifting $H$ with $tilde(H)(s, 0) = tilde(gamma)_0(s)$.

**Corollary**: homotopic paths lift to homotopic paths, so the induced map $p_*: pi_1(tilde(X)) -> pi_1(X)$ is injective.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000033"
front = "What is a simply connected space?"
back = '''
A path-connected space $X$ is *simply connected* if $pi_1(X) = {e}$, i.e., every loop is null-homotopic (contractible to a point).

Examples: $RR^n$, $S^n$ for $n gt.eq 2$, $B^n$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000034"
front = "What is a universal cover? How does it relate to $pi_1$?"
back = '''
A covering map $p: tilde(X) -> X$ is a *universal cover* if $tilde(X)$ is simply connected.

The *deck transformation group* $"Deck"(tilde(X) \/ X) = {phi: tilde(X) -> tilde(X) | p compose phi = p}$ satisfies:
$ pi_1(X, x_0) tilde.equiv "Deck"(tilde(X) \/ X) $

Universal covers are unique up to isomorphism.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000035"
front = "What is $pi_1(RR P^n)$ for $n gt.eq 2$, and why?"
back = '''
$pi_1(RR P^n) tilde.equiv ZZ_2$.

The covering $p: S^n -> RR P^n$ is universal (since $S^n$ is simply connected for $n gt.eq 2$).

The only non-trivial deck transformation is the antipodal map $x mapsto -x$, so $"Deck" tilde.equiv ZZ_2$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000036"
front = "State and prove the Brouwer Fixed Point Theorem."
back = '''
*Every continuous $f: B^2 -> B^2$ has a fixed point.*

**Proof (by contradiction)**: if $f$ has no fixed point, define a retraction $r: B^2 -> S^1$ by sending $x$ to the intersection of the ray from $f(x)$ through $x$ with $S^1$.

Then $r compose i = "id"$ on $S^1$, so $(r compose i)_* = "id"$ on $pi_1(S^1) = ZZ$. But this factors through $pi_1(B^2) = {e}$, forcing $ZZ -> {e} -> ZZ$ to be the identity — contradiction.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000037"
front = "What is the No Retraction Theorem?"
back = '''
There is no retraction $r: B^n -> S^(n-1)$, i.e., no continuous map with $r|_(S^(n-1)) = "id"$.

This implies the Brouwer Fixed Point Theorem: every continuous $f: B^n -> B^n$ has a fixed point.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000038"
front = "How does the Fundamental Theorem of Algebra follow from winding numbers?"
back = '''
Suppose $p(z) = z^n + dots.c + a_0$ has no root. For large $R$, the loop $p$ on $|z| = R$ has winding number $n$ around the origin. As $R -> 0$, the winding number must drop to $0$.

But since $p$ is never $0$, the loop is a homotopy of loops in $RR^2 without {0}$, so the winding number is constant — contradiction.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000039"
front = "What is $pi_1(X times Y)$?"
back = '''
$ pi_1(X times Y, (x_0, y_0)) tilde.equiv pi_1(X, x_0) times pi_1(Y, y_0) $

A loop $gamma$ in $X times Y$ is the same as a pair $(\gamma_1, \gamma_2)$ of loops; the isomorphism is $[gamma] mapsto ([gamma_1], [gamma_2])$.

**Example**: $pi_1(T^2) = pi_1(S^1 times S^1) tilde.equiv ZZ times ZZ = ZZ^2$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000040"
front = "What is the induced homomorphism $f_*$ on fundamental groups?"
back = '''
A continuous map $f: (X, x_0) -> (Y, y_0)$ induces:
$ f_*: pi_1(X, x_0) -> pi_1(Y, y_0), quad f_*([gamma]) = [f compose gamma] $

This is a group homomorphism. It satisfies $(g compose f)_* = g_* compose f_*$ and $"id"_* = "id"$ (functoriality).

In particular, if $f$ is a homeomorphism then $f_*$ is an isomorphism.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000041"
front = "What is a deformation retraction? What does it imply for $pi_1$?"
back = '''
A *deformation retraction* of $X$ onto $A$ is a continuous $H: X times [0,1] -> X$ with:
- $H(x, 0) = x$ for all $x$
- $H(x, 1) in A$ for all $x$
- $H(a, t) = a$ for all $a in A$, $t in [0,1]$

If $A$ is a deformation retract of $X$, then $i: A -> X$ induces an isomorphism $pi_1(A) tilde.equiv pi_1(X)$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000042"
front = "What is homotopy equivalence? How does it relate to homeomorphism?"
back = '''
$f: X -> Y$ and $g: Y -> X$ are a *homotopy equivalence* if $g compose f tilde.eq "id"_X$ and $f compose g tilde.eq "id"_Y$. We write $X tilde.eq Y$.

Homotopy equivalent spaces have isomorphic fundamental groups.

Homeomorphic implies homotopy equivalent, but *not* vice versa. Example: $RR^2 without {0} tilde.eq S^1$ but they are not homeomorphic.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000043"
front = "What is a group presentation $angle.l A | R angle.r$?"
back = '''
A *presentation* describes a group by:
- A set of *generators* $A$
- A set of *relations* $R$ (words in $A union A^(-1)$ set equal to identity)

The group is $F(A) \/ N(R)$ where $F(A)$ is the free group and $N(R)$ is the normal closure of $R$.

Examples: $ZZ = angle.l a | angle.r$, $ZZ_n = angle.l a | a^n angle.r$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000044"
front = "What is the free group $F(A)$?"
back = '''
The *free group* on a set $A$ is the group of *reduced words* in $A union A^(-1)$ under concatenation-and-reduction.

Universal property: any function $A -> G$ extends uniquely to a group homomorphism $F(A) -> G$.

$F({a}) tilde.equiv ZZ$; $F({a, b})$ is the non-abelian free group on two generators.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000045"
front = "What is the free product $G * H$ of two groups?"
back = '''
If $G = angle.l A | R angle.r$ and $H = angle.l B | S angle.r$ (generators disjoint), then:
$ G * H = angle.l A union B | R union S angle.r $

Elements are reduced words alternating between non-identity elements of $G$ and $H$.

Example: $ZZ * ZZ = angle.l a, b | angle.r = F_2$ (free group on two generators).'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000046"
front = "State Van Kampen's theorem (basic version)."
back = '''
Let $X = U union V$ where $U$, $V$ are open and path connected, and $U sect V$ is path connected and *simply connected*. Then:
$ pi_1(X) tilde.equiv pi_1(U) * pi_1(V) $

**Application**: $pi_1(X_1 vee X_2) tilde.equiv pi_1(X_1) * pi_1(X_2)$, e.g. $pi_1(S^1 vee S^1) tilde.equiv ZZ * ZZ = F_2$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000047"
front = "State Van Kampen's theorem (full version with amalgamation)."
back = '''
Let $X = U union V$ with $U$, $V$ open and path connected, $U sect V$ path connected. Let $i_U, i_V$ be the maps induced by inclusion from $pi_1(U sect V)$. Then:
$ pi_1(X) tilde.equiv pi_1(U) *_(pi_1(U sect V)) pi_1(V) $

the *amalgamated free product*: $pi_1(U) * pi_1(V)$ modulo $i_U(g) = i_V(g)$ for all $g in pi_1(U sect V)$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000048"
front = "What are the fundamental groups of the standard surfaces?"
back = '''
- $pi_1(S^2) = {e}$
- $pi_1(T^2) = angle.l a, b | a b a^(-1) b^(-1) angle.r tilde.equiv ZZ^2$
- $pi_1(RR P^2) = angle.l a | a^2 angle.r tilde.equiv ZZ_2$
- $pi_1(K) = angle.l a, b | a b a^(-1) b angle.r$ (Klein bottle group)
- $pi_1(Sigma_g) = angle.l a_1, b_1, dots, a_g, b_g | [a_1,b_1] dots.c [a_g,b_g] angle.r$
- $pi_1(N_k) = angle.l a_1, dots, a_k | a_1^2 dots.c a_k^2 angle.r$'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000049"
front = "What is the abelianisation of a group? How does it give $H_1$?"
back = '''
The *abelianisation* of $G$ is $G^"ab" = G \/ [G, G]$, the largest abelian quotient.

If $G = angle.l A | R angle.r$, then $G^"ab" = angle.l A | R, [a_i, a_j] "for all" i, j angle.r$.

The *first homology group* is defined as $H_1(X) := pi_1(X)^"ab"$.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000050"
front = "What are the first homology groups of the standard surfaces, and how do they distinguish them?"
back = '''
- $H_1(S^2) = 0$
- $H_1(Sigma_g) tilde.equiv ZZ^(2g)$ (free abelian, no torsion)
- $H_1(N_k) tilde.equiv ZZ^(k-1) plus.circle ZZ_2$ (torsion $ZZ_2$ present)

Since $H_1$ is a topological invariant, the presence of $ZZ_2$ torsion distinguishes non-orientable from orientable surfaces, and the rank distinguishes within each family.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000051"
front = "What is a topological $n$-manifold?"
back = '''
A Hausdorff, second-countable space where every point has a neighbourhood homeomorphic to $RR^n$.

Surfaces are compact 2-manifolds (possibly with boundary). A manifold *with boundary* allows half-space neighbourhoods $\{x in RR^n | x_n gt.eq 0\}$ at boundary points.'''

[[cards]]
id = "4a5b6c7d-4444-4abc-8abc-000000000052"
front = "What is free homotopy and how do freely homotopic loops relate in $pi_1$?"
back = '''
A *free homotopy* between loops $gamma_0$ and $gamma_1$ is a continuous $H: [0,1] times [0,1] -> X$ with $H(s,0) = gamma_0(s)$ and $H(s,1) = gamma_1(s)$ — *no* basepoint condition.

If the basepoint traces a path $sigma$, then the loops represent *conjugate* elements: $[gamma_1] = [sigma]^(-1) [gamma_0] [sigma]$ in $pi_1$.'''
